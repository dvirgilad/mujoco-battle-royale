arena:
  # radius of the circular arena in meters
  radius: 3.0
  # height of the arena walls
  wall_height: 0.5
training:
  # number of agents per episode
  num_agents: 4
  # total environment steps before training ends
  total_steps: 1000000
  # save a policy snapshot every N steps
  snapshot_interval: 10000
  # maximum force magnitude an agent can apply
  max_force: 10.0
  # number of past snapshots kept in the opponent pool
  snapshot_pool_size: 20
ppo:
  # learning rate for the optimizer
  lr: 0.0003
  # steps collected per rollout before each update
  n_steps: 2048
  # minibatch size for gradient updates
  batch_size: 64
  # PPO clipping epsilon for the policy ratio
  clip_range: 0.2
  # number of gradient epochs per rollout
  n_epochs: 10
evaluation:
  # evaluate policy every N training steps
  eval_freq: 10000
  # number of episodes per evaluation run
  num_episodes: 100
  # agent counts used to test generalization
  generalization_agent_counts: [4, 6, 8]
